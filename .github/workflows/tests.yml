name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-cask:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew tap-new local/test
      - run: mkdir -p "$(brew --repository local/test)/Casks"
      - run: cp Casks/xenia-edge.rb "$(brew --repository local/test)/Casks/"
      - run: brew style --cask local/test/xenia-edge
      - run: brew audit --cask --online local/test/xenia-edge
      - run: brew install --cask local/test/xenia-edge
      - run: test -d "/Applications/Xenia-edge.app"
      - run: brew uninstall --cask local/test/xenia-edge